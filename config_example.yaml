# AI Security Camera - Example Configuration
# Copy to config.yaml and edit for your setup:
#   cp config_example.yaml config.yaml

cameras:
  detection:
    index: 0                        # Camera index for detection (check with rpicam-hello --list-cameras)
    resolution: [1920, 1080]        # Full HD
    framerate: 30
    type: "imx296"                  # IMX296 Global Shutter recommended
  
  anpr:
    index: 1                        # Camera index for ANPR
    resolution: [4056, 3040]        # IMX477 max resolution for plate readability
    framerate: 15
    type: "imx477"                  # IMX477 HQ Camera with telephoto lens recommended

detection:
  yolo_model: "yolov8n.pt"         # CPU fallback model (used if Hailo unavailable)
  confidence_threshold: 0.5
  classes_to_detect: null           # null = all 80 COCO classes, or list e.g. [0, 2, 5, 7]
  use_hailo: true
  hailo_model_path: "models/yolov8s.hef"

anpr:
  enabled: true
  method: "easyocr"                 # EasyOCR recommended (alternatives: "tesseract")
  trigger_on_vehicle: true
  min_confidence: 0.5
  plate_region: "uk"                # Plate format: "uk", "us", or "eu"

database:
  path: "database/security.db"
  log_all_detections: true
  retention_days: 90                # Auto-clean records older than this

alerts:
  ntfy_server: "http://localhost"   # Local ntfy server, or https://ntfy.sh for public
  ntfy_topic: "security-camera"     # Choose a unique topic name
  send_images: false                # Set true once ntfy attachment config is done
  
  alert_on:
    unknown_plate: true
    blacklisted_plate: true
    known_plate: false
    person_detected: true
    
  cooldown_seconds: 30              # Min seconds between alerts for same plate/person

storage:
  save_images: true
  image_path: "images"
  max_storage_mb: 100000            # 100GB
  save_detection_frames: false      # Save a frame for each detection event?
  save_anpr_frames: true            # Save ANPR capture frames?

performance:
  detection_interval: 0.05          # Target ~20 FPS
  detection_log_cooldown: 30        # Seconds between DB logs per class (0 = log every detection)
  anpr_timeout: 5
  max_queue_size: 20

logging:
  level: "INFO"
  file: "logs/security_camera.log"
  console: true
